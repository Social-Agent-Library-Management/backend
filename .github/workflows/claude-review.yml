name: Claude PR Review

on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    if: |
      (github.event_name == 'pull_request' &&
       github.event.pull_request.draft == false &&
       (github.event.action == 'opened' || github.event.action == 'ready_for_review' || github.event.action == 'synchronize'))
      ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude review'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || github.head_ref }}

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          show_full_output: true
          claude_args: --model claude-sonnet-5 --allowedTools "Bash" "Read" "Write" "WebFetch" "WebSearch" "Skill"
          prompt: |
            `.github/review-guidelines.md` 파일을 먼저 읽고, 그 지침에 따라 리뷰하세요.
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number || github.event.issue.number }} --comment
