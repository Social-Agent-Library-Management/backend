name: Claude PR Review

on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    if: |
      (github.event_name == 'pull_request' &&
       github.event.pull_request.draft == false &&
       (github.event.action == 'opened' || github.event.action == 'ready_for_review' || github.event.action == 'synchronize'))
      ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude review'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || github.head_ref }}

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          show_full_output: true
          claude_args: --model claude-sonnet-5 --allowedTools "Bash" "Read" "Write" "WebFetch" "WebSearch" "Skill"
          prompt: |
            ## 리뷰 지침
            - 모든 리뷰 코멘트, PR 요약, 피드백은 반드시 한국어로 작성하세요.
            - 이 프로젝트는 Kotlin + Spring Boot입니다. (Kotlin 문법이지만 Java 스타일로 작성될 가능성이 있습니다.)

            ## 리뷰 원칙
            - 유지보수성·확장성·안정성 관점에서 왜 문제인지 근거를 함께 설명하세요.
            - 문제를 지적할 때는 가능한 한 수정 방향이나 코드 예시를 함께 제공하세요.
            - 코멘트는 심각도가 MEDIUM 이상인 이슈만 남기세요. 사소한 스타일 취향이나 LOW 수준 이슈는 코멘트로 남기지 마세요.

            ## 리뷰 체크포인트
            ### 1. 로직 정확성
            - 비즈니스 요구사항에 맞는 흐름인지, 엣지 케이스가 누락되지 않았는지 확인
            - Null 안전성: Kotlin의 Null Safety를 적절히 활용하는지, Java 스타일 Optional 남용이 없는지 확인

            ### 2. 네이밍 및 코드 컨벤션
            - Java 스타일 코드가 있다면 Kotlin다운 코드(Data Class, Scope Function, 확장 함수, 컬렉션 API 등)로 개선 제안
              - 제안 시 Java 코드와 Kotlin 코드를 비교하여 장점을 설명

            ### 3. 안정성 및 보안
            - 트랜잭션 경계: 하나의 트랜잭션에서 처리해야 할 작업이 분리되어 있지 않은지 확인
            - SQL 인젝션: 동적 쿼리 작성 시 파라미터 바인딩 사용 여부 확인

            ### 4. 성능 및 확장성
            - N+1 쿼리 문제가 발생할 수 있는 조회 패턴 확인
            - 연관관계 로딩 전략(FetchType.LAZY)이 올바르게 적용되었는지 확인

            ### 5. 유지보수성
            - 에러 처리가 프로젝트의 기존 패턴(BaseErrorCode → DomainException)을 따르는지 확인
            - 중복 코드가 있다면 공통화 가능 여부 검토

            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number || github.event.issue.number }} --comment
