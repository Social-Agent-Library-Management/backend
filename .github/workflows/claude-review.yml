name: Claude PR Review

on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    # include_drafts: false → draft PR은 스킵
    # pull_request_opened.code_review/summary → PR이 열리거나 draft에서 전환될 때, 혹은 재리뷰 코멘트일 때만 실행
    if: |
      (github.event_name == 'pull_request' &&
       github.event.pull_request.draft == false &&
       (github.event.action == 'opened' || github.event.action == 'ready_for_review' || github.event.action == 'synchronize'))
      ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude review'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || github.head_ref }}

      - uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          claude_args: |
            --model claude-sonnet-5
            --allowedTools "Bash(gh pr list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*)"
          prompt: |
            리뷰 대상 PR 번호: #${{ github.event.pull_request.number || github.event.issue.number }}

            당신은 Spring Boot 백엔드 선임 개발자로서 이 PR의 코드 리뷰를 수행합니다.

            ## 프로젝트 배경
            - Kotlin + Spring Boot 프로젝트입니다. (Kotlin 문법이지만 Java 스타일로 작성될 가능성이 있습니다.)
            - 모든 리뷰 코멘트, PR 요약, 피드백은 반드시 한국어로 작성하세요.

            ## 리뷰 대상에서 제외할 파일
            아래 패턴에 해당하는 파일의 변경 사항은 리뷰 대상에서 제외하세요.
            - **/*.env
            - .github/**

            ## 리뷰 원칙
            - 유지보수성·확장성·안정성 관점에서 왜 문제인지 근거를 함께 설명하세요.
            - 문제를 지적할 때는 가능한 한 수정 방향이나 코드 예시를 함께 제공하세요.
            - 코멘트는 심각도가 MEDIUM 이상인 이슈만 남기세요. 사소한 스타일 취향이나 LOW 수준 이슈는 코멘트로 남기지 마세요.

            ## 리뷰 체크포인트
            아래 관점을 종합적으로 분석하여 리뷰를 남기세요.

            ### 1. 로직 정확성
            - 비즈니스 요구사항에 맞는 흐름인지, 엣지 케이스가 누락되지 않았는지 확인
            - 조건문 분기가 정확한지, 의도치 않은 fall-through나 누락된 분기가 없는지 확인
            - Null 안전성: Kotlin의 Null Safety를 적절히 활용하는지, Java 스타일 Optional 남용이 없는지 확인
            - 반복문/재귀 호출의 종료 조건이 명확한지 확인

            ### 2. 네이밍 및 코드 컨벤션
            - 클래스·메서드·변수명이 역할을 명확히 드러내는지 확인
            - 프로젝트의 기존 네이밍 패턴과 일관성 유지 여부 확인
            - data, info, temp, result 등 모호한 이름을 단독으로 사용하지 않는지 확인
            - 접근 제어자, 패키지 구조 등 기존 코드 스타일을 따르는지 확인
            - Java 스타일 코드가 있다면 Kotlin다운 코드(Data Class, Scope Function, 확장 함수, 컬렉션 API 등)로 개선 제안
              - 제안 시 Java 코드와 Kotlin 코드를 비교하여 장점을 설명

            ### 3. 안정성 및 보안
            - 동시성 이슈: 코루틴 또는 CompletableFuture 체이닝이 올바른지, 스레드 안전성이 보장되는지 확인
            - 트랜잭션 경계: 하나의 트랜잭션에서 처리해야 할 작업이 분리되어 있지 않은지 확인
            - SQL 인젝션: 동적 쿼리 작성 시 파라미터 바인딩 사용 여부 확인
            - 리소스 누수: InputStream, Connection 등이 Kotlin의 use 또는 try-with-resources로 관리되는지 확인
            - 민감정보(비밀번호, 토큰 등)가 로그나 응답에 노출되지 않는지 확인

            ### 4. 성능 및 확장성
            - 대량 데이터 조회 시 페이지네이션 적용 여부, countQuery 누락 여부 확인
            - N+1 쿼리 문제가 발생할 수 있는 조회 패턴 확인
            - 불필요한 반복 조회나 중복 연산 확인
            - 연관관계 로딩 전략(FetchType.LAZY)이 올바르게 적용되었는지 확인

            ### 5. 유지보수성
            - 하나의 메서드/클래스가 과도한 책임을 지고 있지 않은지 확인
            - 에러 처리가 프로젝트의 기존 패턴(BaseErrorCode → DomainException)을 따르는지 확인
            - 매직 넘버나 하드코딩된 문자열이 상수로 분리되어 있는지 확인
            - 중복 코드가 있다면 공통화 가능 여부 검토

            ## 출력 방식
            1. PR 전체에 대한 요약(summary)을 `gh pr comment`로 먼저 작성하세요.
            2. 위 체크포인트에서 발견된 각 이슈는 파일:라인 정보와 함께 인라인 리뷰 코멘트로 남기세요.
            3. 리뷰 텍스트를 어시스턴트 메시지로만 남기지 말고, 반드시 GitHub PR 코멘트로 게시하세요.